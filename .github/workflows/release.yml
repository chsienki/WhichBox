name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version consistency
        run: |
          ROOT_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Tag:     $TAG_VERSION"
          echo "VERSION: $ROOT_VERSION"

          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match VERSION file ($ROOT_VERSION)"
            exit 1
          fi

  build:
    needs: validate-version
    strategy:
      matrix:
        include:
          - rid: win-x64
            platform: x64
            arch: x64
          - rid: win-arm64
            platform: ARM64
            arch: arm64

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Publish (AOT)
        run: >
          dotnet publish src/WhichBox/WhichBox.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:Platform=${{ matrix.platform }}
          --self-contained true
          -o publish/${{ matrix.rid }}

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DMyAppArch=${{ matrix.arch }}
          /DPublishDir=publish\${{ matrix.rid }}
          installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: WhichBox-${{ matrix.arch }}-Setup
          path: installer-output/WhichBox-${{ matrix.arch }}-Setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG..${{ github.ref_name }}" -- | grep -v "^- Bump version" || true)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${{ github.ref_name }}" -- | grep -v "^- Bump version" || true)
          fi

          {
            echo "## What's New"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "## Install"
            echo ""
            echo "Download the installer for your architecture and run it."
            echo "No admin rights required -- installs to your user profile."
          } > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhichBox ${{ steps.version.outputs.version }}
          body_path: /tmp/release-body.md
          files: artifacts/*
          fail_on_unmatched_files: true
